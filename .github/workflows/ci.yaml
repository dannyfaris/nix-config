# Per-host build + lint/format gate. The explicit `name:` on the job
# produces job display names `flake-check (x86_64-linux)` and
# `flake-check (aarch64-linux)` — the names branch-protection on `main`
# requires (configured out-of-band per ADR-025 §Implementation
# operator-side setup). Without the explicit name, GitHub would
# auto-generate `flake-check (x86_64-linux, ubuntu-24.04)` from every
# matrix dimension (including `runner:` introduced by `include`), which
# would never match the protection rule.
#
# See docs/decisions/ADR-025-ci-in-flake.md for the framework rationale.
name: flake-check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PR runs: group by branch, cancel stale. Main runs: group by run_id,
  # never cancel (one in-flight per push is the worst case anyway).
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default-permissions pin (defense-in-depth). The workflow only needs to
# read repo contents — checkout clones, Nix fetches public flake inputs.
# Without this, GitHub grants the broader default which includes write
# scopes for several APIs we don't use. Explicit-over-implicit per
# CLAUDE.md's whitelist > blanket stance, applied to the workflow's
# token surface.
permissions:
  contents: read

jobs:
  flake-check:
    name: flake-check (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64-linux, aarch64-linux, aarch64-darwin]
        include:
          - arch: x86_64-linux
            runner: ubuntu-24.04
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
          # Darwin runner — closes the CI-coverage gap that issue #190
          # named: darwinConfigurations.mac-mini gets zero structural
          # verification until this matrix entry exists.
          #
          # `nix flake check` on the macOS runner realises
          # `flake.checks.aarch64-darwin.host-mac-mini` declared in
          # parts/checks.nix. The build phase does NOT run activation
          # (nix-darwin's brew bundle / mas install / launchctl loads
          # fire at `darwin-rebuild switch` time, not at build time), so
          # the CI step is safe — no Homebrew side-effects, no MAS
          # network calls, no admin prompts.
          #
          # Runner pinning — `macos-15` chosen:
          #   - It's the current stable Apple Silicon (ARM64) line.
          #     `macos-14` is still supported but on the deprecation
          #     runway; `macos-latest` moves under us (was migrated to
          #     macos-15 in Aug 2025 per actions/runner-images#12520);
          #     the `-large` / `-xlarge` / `-intel` variants are metered
          #     on public repos while the standard macos-15 label is
          #     free (per GitHub's billing docs).
          #   - aarch64-darwin matches mac-mini's actual arch — no
          #     Rosetta 2 cross-arch surprises.
          # The cost concern that issue #190 raised (macos minutes
          # cost) doesn't bite: this repo is public, and standard
          # macos-15 minutes are free on public repos.
          - arch: aarch64-darwin
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          # Explicit GH token for Nix's github.com fetches.
          # install-nix-action v31's docs say `GITHUB_TOKEN` is picked
          # up automatically when this input is empty; setting it
          # explicitly is defense-in-depth (makes auth deterministic
          # and surfaces in the action's logs).
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

          # `accept-flake-config = false` carries the whitelist-over-blanket
          # stance from modules/shared/nix-daemon.nix into CI: a
          # transitive input's nixConfig block can't silently add a
          # substituter or change settings here.
          #
          # niri.cachix.org is whitelisted explicitly below — mirrors the
          # nix.settings in modules/nixos/niri.nix (ADR-028 slice 3b.5).
          # Without this, CI's daemon doesn't trust the cache, niri builds
          # from source, and the build hits the in-flight nixpkgs Rust
          # crate fetcher 403 (rust-lang/crates.io#13482,
          # NixOS/nixpkgs#512735). Public key sourced from niri-flake's
          # flake.nix (the same key niri-flake would have added via the
          # default-true cache.enable). Cross-arch note: niri.cachix.org
          # serves x86_64-linux only, but flake-check builds every host
          # (including aarch64 nixos-vm) and aarch64 hosts don't import
          # the niri module, so the substituter is queried only for the
          # x86_64 matrix entry.
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = false
            extra-substituters = https://niri.cachix.org
            extra-trusted-public-keys = niri.cachix.org-1:Wv0OmO7PsuocRKzfDoJ3mulSl7Z6oezYhGhR+3W2964=

      # Store-path cache across cold runs (ADR-028 slice-3 follow-up, #61).
      # This is `actions/cache`-shaped storage for build *outputs* — it is
      # NOT a substituter, and is orthogonal to the niri.cachix.org trust
      # lines above (#59). It amortises the non-niri half of the desktop
      # closure that a fresh runner otherwise rebuilds every cold run:
      # Quickshell + Qt6 + matugen + DMS + xwayland-satellite + foot and
      # their transitive deps.
      #
      # Why this and not Cachix/FlakeHub/Attic: those are larger trust or
      # operational delegations than a one-operator / three-host project
      # warrants today. `cache-nix-action` first; revisit Cachix/Attic only
      # if hit rate stays below ~60% over a month or a second major
      # source-built dep arrives (#61 "Triggers to revisit").
      #
      # Key semantics: keyed on os × arch × flake.lock hash, so a lock bump
      # invalidates cleanly. PR branches restore from the os×arch prefix
      # seeded on main — the squash-auto-merge flow reseeds the cache after
      # each PR lands. GC before save (5G ceiling) keeps x86_64 + aarch64
      # entries coexisting under the 10 GB per-repo limit; a 7-day
      # last-accessed purge sweeps dead prefix entries without ever purging
      # the run's own primary key.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
          gc-max-store-size-linux: 5G
          # Darwin counterpart to gc-max-store-size-linux. mac-mini's
          # closure is ~7.3 GiB at write-time (verified locally). PR
          # #218 shipped this at 5G (matching the Linux ceiling)
          # provisionally and observed cold Darwin runs at 38-55 min
          # — the 5G ceiling forced ~2.3 GiB eviction on save, so
          # warm-cache runs restored only ~5 GiB and re-fetched the
          # rest from cache.nixos.org each time. 8G holds the full
          # closure with ~700 MB headroom for growth (per #219).
          #
          # Repo-wide cache budget callout: GitHub Actions caps each
          # repo's cache pool at 10 GB. With both Linux entries at
          # 5G each + Darwin at 8G, the theoretical max is 18 GB and
          # GitHub will LRU-evict across the pool. Linux closures
          # are well under their 5G ceiling so this is more headroom
          # than it looks. Worth knowing if future Linux closures
          # grow.
          #
          # The Linux niri.cachix substituter is irrelevant on Darwin
          # — Nix only queries substituters for outputs it's trying
          # to build, and the mac-mini closure doesn't include niri.
          gc-max-store-size-macos: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-
          purge-created: 0 # no created-age gate; last-accessed is the real filter
          purge-last-accessed: 604800
          # Force resave on every successful run by purging the
          # existing primary-key entry early in the save step.
          # `cache-nix-action`'s save logic wraps `actions/cache`'s
          # standard "primary-key hit → save is a no-op" semantic:
          # without this knob set to `always`, every run after the
          # first hits the primary key, skips the save with the log
          # line "Cache hit occurred on the primary-key. Not
          # collecting garbage. Not saving a new cache.", and the
          # original cache contents are cemented in the pool — even
          # if the closure has since grown, or the GC ceiling has
          # been raised. That's what we observed on Darwin between
          # #218 (first cold save at 5G ceiling clamped the closure
          # to 1.3 GiB compressed) and #222 (8G ceiling change that
          # couldn't take effect until this knob is flipped). See
          # #225 for the full root-cause analysis.
          #
          # The escape-hatch flow: with `purge-primary-key: always`,
          # `saveImpl.ts:54-58` calls `purgeCaches({primaryKey})`
          # *before* the save-step's existence check, so the lookup
          # subsequently misses, GC runs against the current closure
          # under the configured cap, and a fresh full cache is
          # saved. Each successful run then refreshes its primary
          # key automatically — no manual bump, no version suffix.
          purge-primary-key: always

      - run: nix flake check --print-build-logs
