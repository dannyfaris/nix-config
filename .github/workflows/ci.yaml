# Per-host build + lint/format gate. The explicit `name:` on the job
# produces job display names `flake-check (x86_64-linux)` and
# `flake-check (aarch64-linux)` — the names branch-protection on `main`
# requires (configured out-of-band per ADR-025 §Implementation
# operator-side setup). Without the explicit name, GitHub would
# auto-generate `flake-check (x86_64-linux, ubuntu-24.04)` from every
# matrix dimension (including `runner:` introduced by `include`), which
# would never match the protection rule.
#
# See docs/decisions/ADR-025-ci-in-flake.md for the framework rationale.
name: flake-check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PR runs: group by branch, cancel stale. Main runs: group by run_id,
  # never cancel (one in-flight per push is the worst case anyway).
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default-permissions pin (defense-in-depth). The workflow only needs to
# read repo contents — checkout clones, Nix fetches public flake inputs.
# Without this, GitHub grants the broader default which includes write
# scopes for several APIs we don't use. Explicit-over-implicit per
# CLAUDE.md's whitelist > blanket stance, applied to the workflow's
# token surface.
permissions:
  contents: read

jobs:
  flake-check:
    name: flake-check (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64-linux, aarch64-linux]
        include:
          - arch: x86_64-linux
            runner: ubuntu-24.04
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          # Explicit GH token for Nix's github.com fetches.
          # install-nix-action v31's docs say `GITHUB_TOKEN` is picked
          # up automatically when this input is empty; setting it
          # explicitly is defense-in-depth (makes auth deterministic
          # and surfaces in the action's logs).
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

          # `accept-flake-config = false` carries the whitelist-over-blanket
          # stance from modules/nixos/nix-daemon.nix into CI: a
          # transitive input's nixConfig block can't silently add a
          # substituter or change settings here.
          #
          # niri.cachix.org is whitelisted explicitly below — mirrors the
          # nix.settings in modules/nixos/niri.nix (ADR-028 slice 3b.5).
          # Without this, CI's daemon doesn't trust the cache, niri builds
          # from source, and the build hits the in-flight nixpkgs Rust
          # crate fetcher 403 (rust-lang/crates.io#13482,
          # NixOS/nixpkgs#512735). Public key sourced from niri-flake's
          # flake.nix (the same key niri-flake would have added via the
          # default-true cache.enable). Cross-arch note: niri.cachix.org
          # serves x86_64-linux only, but flake-check builds every host
          # (including aarch64 nixos-vm) and aarch64 hosts don't import
          # the niri module, so the substituter is queried only for the
          # x86_64 matrix entry.
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = false
            extra-substituters = https://niri.cachix.org
            extra-trusted-public-keys = niri.cachix.org-1:Wv0OmO7PsuocRKzfDoJ3mulSl7Z6oezYhGhR+3W2964=

      - run: nix flake check --print-build-logs
