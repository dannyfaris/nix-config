# Recipients.
#
# Host recipients (metis): age keys derived from each NixOS
# secret-holder's /etc/ssh/ssh_host_ed25519_key. Used at activation
# time by sops-nix to decrypt secrets for the running host. One per
# NixOS host that holds a secret — the identity reproduces with the
# host on reprovision, so it needs no backup of its own
# (docs/design/fleet-key-custody.md, machine-decryption tier). Darwin
# hosts hold no host identity: they declare no secrets.
#
# Operator recipient (operator): a standalone age-keygen key with no
# SSH ancestry — the fleet's edit + disaster-recovery root
# (docs/design/fleet-key-custody.md). Lives at
# ~/.config/sops/age/keys.txt on the operator's Macs, repopulated
# from the vault, never derived from an SSH key. Rotating it must
# refresh every copy in the same sitting (vault + offline + any
# escrow) or recovery silently splits.
#
# Recovery (last resort, #279). The operator key is held in 1Password
# (item "sops age key - operator") with a second offline copy. If
# every host AND every Mac are lost: write that value to
# ~/.config/sops/age/keys.txt (chmod 600) on any machine with sops +
# age, then `sops -d secrets/secrets.yaml` decrypts. Verify a
# restored keys.txt without exposing it: `age-keygen -y <file>` must
# print the `operator` public key below.
keys:
  - &metis    age1fum23dvym045wsc0g85lgtpvhjgekj66nkg9krslx0fa8ahmyffsu5nj2t
  - &operator age12dv25pjp7xccjagz2mmpg0pcwutee8eut34tuaqzaqn9wvqmvysqumvgx8

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *metis
          - *operator
